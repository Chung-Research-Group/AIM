name: PR checks

on:
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check changed-line whitespace
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ -n "${BASE_SHA}" ]] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "${BASE_SHA}...${HEAD_SHA}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi

      - name: Check repository invariants
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python ci/check_repository.py 2>&1 | tee artifacts/repository-hygiene.txt

      - name: Upload repository hygiene report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: repository-hygiene
          path: artifacts/repository-hygiene.txt
          if-no-files-found: warn
          retention-days: 14

  code-analyzer:
    name: MATLAB Code Analyzer (R2024a)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up MATLAB R2024a
        uses: matlab-actions/setup-matlab@a0180c939fb1a28de13f44f7b778b912384ced1f # v3
        with:
          release: R2024a
          cache: true

      - name: Run Code Analyzer
        uses: matlab-actions/run-build@8a35eec46b4cc438e5e0af3e49f5261cbf34cf43 # v3
        with:
          tasks: check

      - name: Upload Code Analyzer results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: code-analyzer-r2024a
          path: |
            artifacts/code-issues.sarif
            artifacts/code-issues.mat
          if-no-files-found: warn
          retention-days: 14

  matlab-tests:
    name: MATLAB tests (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: R2024a / Linux
            os: ubuntu-latest
            release: R2024a
            artifact: r2024a-linux
          - name: latest / Windows
            os: windows-latest
            release: latest
            artifact: latest-windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up MATLAB and required products
        uses: matlab-actions/setup-matlab@a0180c939fb1a28de13f44f7b778b912384ced1f # v3
        with:
          release: ${{ matrix.release }}
          products: MATLAB_Test Optimization_Toolbox
          cache: true

      - name: Run unit and numerical-invariant tests
        uses: matlab-actions/run-build@8a35eec46b4cc438e5e0af3e49f5261cbf34cf43 # v3
        with:
          tasks: test

      - name: Upload test and coverage results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: matlab-test-${{ matrix.artifact }}
          path: |
            artifacts/test-results.xml
            artifacts/test-results.mat
            artifacts/coverage.xml
            artifacts/coverage.mat
          if-no-files-found: warn
          retention-days: 14

  pr-gate:
    name: PR gate
    if: always()
    needs:
      - repository-hygiene
      - code-analyzer
      - matlab-tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every PR check to pass
        shell: bash
        env:
          HYGIENE_RESULT: ${{ needs.repository-hygiene.result }}
          ANALYZER_RESULT: ${{ needs.code-analyzer.result }}
          TEST_RESULT: ${{ needs.matlab-tests.result }}
        run: |
          printf 'Repository hygiene: %s\n' "${HYGIENE_RESULT}"
          printf 'MATLAB Code Analyzer: %s\n' "${ANALYZER_RESULT}"
          printf 'MATLAB test matrix: %s\n' "${TEST_RESULT}"

          if [[ "${HYGIENE_RESULT}" != "success" ||
                "${ANALYZER_RESULT}" != "success" ||
                "${TEST_RESULT}" != "success" ]]; then
            exit 1
          fi
